<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP, AI Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #faf8f4; --paper: #fff9f2; --ink: #1a1208; --muted: #7a6f5e;
    --accent: #b85c2a; --accent-light: #f0e0d0; --border: #e8ddd0; --tag-bg: #f0ebe2;
    --report-blue: #1a52c8; --report-pale: #eff6ff; --report-ink: #0f1c2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'Noto Sans KR', sans-serif; font-weight: 300; min-height: 100vh; }
  header { background: var(--ink); color: var(--bg); padding: 40px 60px 36px; display: flex; align-items: flex-end; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; letter-spacing: -0.02em; line-height: 1; }
  header h1 span { font-family: 'Noto Sans KR', sans-serif; font-size: 0.75rem; font-weight: 300; display: block; color: #a89880; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
  .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn { border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 0.8rem; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: white; padding: 10px 22px; font-weight: 500; letter-spacing: 0.05em; }
  .btn-primary:hover { background: #9e4e24; }
  .btn-ghost { background: transparent; color: #a89880; border: 1px solid #3a3020; padding: 9px 18px; }
  .btn-ghost:hover { border-color: #a89880; color: var(--bg); }
  .btn-ai { background: linear-gradient(135deg, #4a2080, #7b3fc0); color: white; padding: 10px 20px; font-weight: 500; letter-spacing: 0.03em; }
  .btn-ai:hover { background: linear-gradient(135deg, #3a1860, #6b30a8); }
  .stats-bar { background: var(--accent-light); border-bottom: 1px solid var(--border); padding: 14px 60px; display: flex; gap: 40px; }
  .stat { display: flex; align-items: baseline; gap: 8px; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: var(--muted); }
  .main { display: block; min-height: calc(100vh - 130px); }
  .content { max-width: 900px; margin: 0 auto; padding: 40px 50px; }
  .entries-grid { display: grid; gap: 24px; }
  .entry-card { background: var(--paper); border: 1px solid var(--border); padding: 28px 32px; position: relative; transition: box-shadow 0.2s; cursor: pointer; }
  .entry-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
  .entry-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); opacity: 0; transition: opacity 0.2s; }
  .entry-card:hover::before { opacity: 1; }
  .card-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .card-date { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; }
  .card-category { font-size: 0.68rem; background: var(--accent-light); color: var(--accent); padding: 2px 10px; font-weight: 500; }
  .card-title { font-family: 'Noto Serif KR', serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 10px; line-height: 1.4; }
  .card-body { font-size: 0.87rem; color: var(--muted); line-height: 1.8; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { margin-top: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .card-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .link-chip { font-size: 0.68rem; background: var(--tag-bg); color: var(--accent); padding: 3px 10px; text-decoration: none; transition: background 0.15s; }
  .link-chip:hover { background: var(--accent-light); }
  .card-actions { display: flex; gap: 8px; }
  .icon-btn { background: none; border: 1px solid var(--border); width: 30px; height: 30px; cursor: pointer; font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .card-image-preview { margin-top: 12px; }
  .card-image-preview img { max-width: 100%; max-height: 200px; object-fit: cover; border: 1px solid var(--border); }
  .attachments-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .attachments-title { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .attachment-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 0.7rem; background: #eef4ff; color: #3b6ea8; padding: 3px 10px; margin-right: 6px; margin-bottom: 5px; border: 1px solid #c8d8f0; border-radius: 4px; cursor: pointer; text-decoration: none; transition: background 0.15s; }
  a.attachment-chip:hover { background: #dce9ff; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(26,18,8,0.6); z-index: 200; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: var(--paper); width: 680px; max-width: 95vw; max-height: 90vh; overflow-y: auto; padding: 48px; }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin-bottom: 32px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
  .form-group { margin-bottom: 22px; }
  label { display: block; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  input[type="text"], input[type="date"], input[type="url"], input[type="password"], textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 11px 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem; color: var(--ink); font-weight: 300; outline: none; transition: border-color 0.15s; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 120px; line-height: 1.7; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .links-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
  .link-row { display: flex; gap: 8px; align-items: center; }
  .link-row input { flex: 1; }
  .link-row input:first-child { max-width: 140px; }
  .images-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
  .image-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .image-row input { flex: 1; }
  .image-row input:first-child { max-width: 140px; }
  .image-preview-thumb { width: 48px; height: 48px; object-fit: cover; border: 1px solid var(--border); display: none; flex-shrink: 0; }
  .add-link-btn { font-size: 0.78rem; color: var(--accent); background: none; border: 1px dashed var(--accent); padding: 7px 16px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
  .add-link-btn:hover { background: var(--accent-light); }
  .remove-link-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; }
  .remove-link-btn:hover { color: var(--accent); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
  .view-title { font-family: 'Noto Serif KR', serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
  .view-meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 24px; }
  .view-body { font-size: 0.9rem; line-height: 1.9; white-space: pre-wrap; border-top: 1px solid var(--border); padding-top: 24px; margin-bottom: 24px; }
  .view-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
  .view-images { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; margin-bottom: 16px; }
  .view-images img { max-width: 100%; max-height: 300px; object-fit: contain; border: 1px solid var(--border); cursor: pointer; }
  .search-bar { margin-bottom: 28px; position: relative; }
  .search-bar input { padding-left: 40px; background: var(--paper); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; pointer-events: none; }
  @media (max-width: 700px) {
    header { padding: 24px 20px; } .stats-bar { padding: 14px 20px; gap: 20px; overflow-x: auto; }
    .content { padding: 24px 20px; } .modal { padding: 28px 24px; } .form-row { grid-template-columns: 1fr; }
    .header-actions { gap: 6px; } .btn-ai,.btn-primary,.btn-ghost { font-size: 0.72rem; padding: 8px 12px; }
  }
  @media print {
    header, .header-actions, .stats-bar, .card-actions, .search-bar { display: none !important; }
    .main { display: block; } .content { padding: 0; } .entry-card { break-inside: avoid; margin-bottom: 20px; }
  }
  .loading-overlay { display:none; position:fixed; inset:0; background:rgba(26,18,8,0.55); z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:16px; color:#fff; font-size:0.9rem; }
  .loading-overlay.show { display:flex; }
  .spinner { width:36px; height:36px; border:3px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .toast { position:fixed; bottom:30px; right:30px; background:var(--ink); color:#fff; padding:12px 20px; font-size:0.82rem; z-index:1000; display:none; border-left:3px solid var(--accent); }
  .toast.show { display:block; }
  .toast.error { border-left-color:#e53e3e; }
  /* PIN 모달 */
  .pin-overlay { display:none; position:fixed; inset:0; background:rgba(26,18,8,0.7); z-index:2000; align-items:center; justify-content:center; }
  .pin-overlay.show { display:flex; }
  .pin-box { background:var(--paper); padding:40px 36px; text-align:center; width:320px; border-radius:4px; }
  .pin-box h3 { font-family:'DM Serif Display',serif; font-size:1.3rem; margin-bottom:8px; }
  .pin-box p { font-size:0.82rem; color:var(--muted); margin-bottom:24px; }
  .pin-input { font-size:1.6rem; letter-spacing:0.4em; text-align:center; width:140px; border:2px solid var(--border); padding:10px; background:var(--bg); color:var(--ink); font-family:'Noto Sans KR',sans-serif; }
  .pin-input:focus { border-color:var(--accent); outline:none; }
  .pin-error { color:#e53e3e; font-size:0.8rem; margin-top:10px; min-height:18px; }
  .pin-btn { margin-top:20px; width:100%; }
  /* AI 보고서 모달 */
  .pf-overlay { display:none; position:fixed; inset:0; background:rgba(15,28,46,0.82); z-index:300; overflow-y:auto; padding:40px 20px; }
  .pf-overlay.open { display:block; }
  .pf-box { background:#fff; width:920px; max-width:98vw; margin:0 auto; padding:52px; position:relative; font-family:'Pretendard','Noto Sans KR',sans-serif; }
  .pf-box h2 { font-family:'Pretendard','Noto Sans KR',sans-serif; font-size:1.55rem; font-weight:700; margin-bottom:6px; color:#0f1c2e; letter-spacing:-0.01em; }
  .pf-subtitle { font-size:0.73rem; color:var(--muted); margin-bottom:32px; letter-spacing:0.1em; text-transform:uppercase; border-bottom:2px solid #1a52c8; padding-bottom:16px; }
  .pf-content { font-size:0.9rem; line-height:1.95; color:#1a2340; border:1px solid #d8e4f8; padding:36px; background:#fafcff; min-height:200px; font-family:'Pretendard','Noto Sans KR',sans-serif; }
  .pf-content.generating { color:var(--muted); font-style:italic; }
  .pf-content h1 { font-size:1.25rem; font-weight:700; color:#0f1c2e; margin:28px 0 12px; padding-bottom:8px; border-bottom:2px solid #1a52c8; }
  .pf-content h2 { font-size:1.05rem; font-weight:700; color:#0f1c2e; margin:22px 0 10px; padding-left:10px; border-left:3px solid #1a52c8; }
  .pf-content h3 { font-size:0.95rem; font-weight:600; color:#263d6e; margin:16px 0 8px; }
  .pf-content h4 { font-size:0.88rem; font-weight:600; margin:12px 0 6px; }
  .pf-content p { margin:5px 0; }
  .pf-content ul { padding-left:20px; margin:5px 0; }
  .pf-content li { margin:3px 0; }
  .pf-content strong { font-weight:700; color:#0f1c2e; }
  .pf-content em { font-style:italic; }
  .pf-content hr { border:none; border-top:1px solid #dce8f8; margin:20px 0; }
  .pf-actions { display:flex; gap:12px; margin-top:20px; justify-content:flex-end; flex-wrap:wrap; }
  .apikey-box { background:#eff6ff; border:1px solid #c0d0f0; padding:18px 20px; margin-bottom:24px; }
  .apikey-box p { font-size:0.8rem; color:var(--muted); margin-bottom:8px; }
  .apikey-hint { font-size:0.72rem; color:var(--muted); margin-top:6px; }
  .apikey-hint a { color:#1a52c8; }
  /* 이력서 섹션 */
  .resume-section { margin-top:40px; padding-top:32px; border-top:2px solid #1a52c8; font-family:'Pretendard','Noto Sans KR',sans-serif; }
  .resume-section-title { font-size:1.05rem; font-weight:700; color:#0f1c2e; margin-bottom:20px; padding-left:10px; border-left:3px solid #1a52c8; }
  .resume-block { margin-bottom:22px; }
  .resume-block-header { font-size:0.68rem; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:#1a52c8; margin-bottom:10px; }
  .career-list { display:flex; flex-direction:column; gap:5px; }
  .career-item { display:grid; grid-template-columns:165px 1fr 1fr; gap:14px; padding:10px 14px; background:#f6f9ff; border:1px solid #dce6f8; align-items:center; font-size:0.82rem; }
  .career-item.career-current { background:#eff6ff; border-color:#b8cef8; }
  .career-period { color:#6070a0; font-size:0.77rem; }
  .career-org { font-weight:600; color:#0f1c2e; }
  .career-role { color:#6070a0; font-size:0.8rem; }
  .resume-row-2col { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:16px; }
  .resume-info-item { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:0.83rem; color:#1a2340; }
  .info-badge { background:#eff6ff; color:#1a52c8; font-size:0.66rem; font-weight:700; padding:2px 8px; letter-spacing:0.05em; white-space:nowrap; border:1px solid #c0d0f0; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div id="loadingText">연결 중...</div></div>
<div class="toast" id="toast"></div>

<!-- PIN 모달 -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <h3>🔐 수정 잠금</h3>
    <p>PIN 4자리를 입력하세요</p>
    <input class="pin-input" type="password" id="pinInput" maxlength="4" placeholder="••••"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')"
      onkeydown="if(event.key==='Enter')checkPin()">
    <div class="pin-error" id="pinError"></div>
    <button class="btn btn-primary pin-btn" onclick="checkPin()">확인</button>
    <button class="btn btn-ghost pin-btn" style="margin-top:8px" onclick="closePinModal()">취소</button>
  </div>
</div>

<!-- AI 포트폴리오 모달 -->
<div class="pf-overlay" id="pfOverlay">
  <div class="pf-box">
    <h2>업무와 AI 포트폴리오 및 경력내용</h2>
    <div class="pf-subtitle">AI 학습 여정 기록을 종합하여 제출용 공식 보고서를 자동 작성합니다</div>

    <div class="apikey-box" id="apikeyBox">
      <p>Claude API Key를 입력하세요 (한 번 입력하면 브라우저가 기억합니다)</p>
      <input type="password" id="claudeApiKey" placeholder="sk-ant-api03-...">
      <div class="apikey-hint">API Key 발급: <a href="https://console.anthropic.com/keys" target="_blank">console.anthropic.com/keys</a></div>
    </div>

    <div class="form-group">
      <label>언어</label>
      <select id="pfLang">
        <option value="korean">한국어</option>
        <option value="english">English</option>
        <option value="both">한국어 + English (이중 언어)</option>
      </select>
    </div>
    <div class="form-group">
      <label>제출 목적</label>
      <input type="text" id="pfPurpose" placeholder="예: AI 스타트업 지원, 사내 발표, 개인 기록 정리 등">
    </div>

    <div id="pfResult" style="display:none;margin-top:28px;">
      <label style="margin-bottom:12px;display:block;">📄 생성된 포트폴리오</label>
      <div class="pf-content" id="pfContent"></div>
      <div class="pf-actions">
        <button class="btn btn-ghost" onclick="copyPortfolio()">📋 복사</button>
        <button class="btn btn-ghost" onclick="printPortfolio()">🖨 인쇄 / PDF</button>
        <button class="btn btn-primary" onclick="generatePortfolio()">다시 생성</button>
      </div>
    </div>

    <div style="display:flex;gap:12px;margin-top:28px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:20px;">
      <button class="btn btn-ghost" onclick="closePf()">닫기</button>
      <button class="btn btn-ai" onclick="generatePortfolio()">보고서 생성</button>
    </div>
  </div>
</div>

<header>
  <h1><span>JP, AI Journey</span>AI와 함께 가는 길</h1>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="window.print()">🖨 인쇄</button>
    <button class="btn btn-ai" onclick="requirePin('portfolio')">AI 보고서</button>
    <button class="btn btn-primary" onclick="requirePin('add')">+ 새 기록 추가</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-num" id="stat-total">0</span><span class="stat-label">총 기록</span></div>
  <div class="stat"><span class="stat-num" id="stat-days">0</span><span class="stat-label">기록 일수</span></div>
  <div class="stat"><span class="stat-num" id="stat-links">0</span><span class="stat-label">연결된 링크</span></div>
  <div class="stat"><span class="stat-num" id="stat-this-month">0</span><span class="stat-label">이번 달</span></div>
</div>

<div class="main">
  <div class="content">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="제목, 내용으로 검색..." oninput="renderEntries()">
    </div>
    <div class="entries-grid" id="entriesGrid"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="addOverlay" onclick="closeOnOverlay(event,'addOverlay')">
  <div class="modal">
    <h2 id="modalTitle">새 기록 추가</h2>
    <div class="form-row">
      <div class="form-group"><label>날짜</label><input type="date" id="fDate"></div>
      <div class="form-group"><label>카테고리</label>
        <select id="fCategory">
          <option value="학습">📚 학습</option>
          <option value="바이브코딩">💻 바이브코딩</option>
          <option value="창작물">🎨 창작물</option>
          <option value="워크플로우">⚙️ 워크플로우</option>
          <option value="아이디어">💡 아이디어</option>
          <option value="성과">🏆 성과</option>
          <option value="기타">📝 기타</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>제목</label><input type="text" id="fTitle" placeholder="오늘 배우거나 만든 것을 간단히..."></div>
    <div class="form-group"><label>내용</label><textarea id="fBody" placeholder="오늘의 경험, 느낀 점, 배운 내용을 자유롭게 기록하세요."></textarea></div>
    <div class="form-group">
      <label>🔗 관련 링크</label>
      <div class="links-list" id="linksList"></div>
      <button class="add-link-btn" onclick="addLinkRow()">+ 링크 추가</button>
    </div>
    <div class="form-group">
      <label>🖼 이미지 첨부 (URL)</label>
      <div class="images-list" id="imagesList"></div>
      <button class="add-link-btn" onclick="addImageRow()">+ 이미지 URL 추가</button>
      <div style="font-size:0.72rem;color:var(--muted);margin-top:6px;">이미지를 <a href="https://imgur.com" target="_blank" style="color:var(--accent)">imgur.com</a> 등에 업로드 후 URL을 붙여넣으세요.</div>
    </div>
    <div class="form-group">
      <label>📁 파일/창작물 첨부 (URL)</label>
      <div class="links-list" id="attachmentsList"></div>
      <button class="add-link-btn" onclick="addAttachmentRow()">+ 파일 링크 추가</button>
    </div>
    <div class="modal-actions">

function renderMarkdown(text) {
  return text
    .replace(/^#### (.+)$/gm,'<h4>$1</h4>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^---+$/gm,'<hr>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g,function(m){return '<ul>'+m+'</ul>';})
    .replace(/\n\n/g,'</p><p>');
}
