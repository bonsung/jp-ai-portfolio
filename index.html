// ── 상태 ──────────────────────────────────────────────────
let entries = [];
let editId = null;
let activeFilter = '전체';

// ── Supabase CRUD ─────────────────────────────────────────
async function loadEntries() {
  const { data, error } = await sb.from('entries').select('*').order('date', { ascending: false });
  if (error) { showToast('데이터 불러오기 실패: ' + error.message, true); return []; }
  return data || [];
}

async function save() {
  // entries 배열은 항상 최신 상태 — 개별 upsert는 saveEntry()에서 처리
}

async function upsertEntry(entry) {
  const { error } = await sb.from('entries').upsert(entry, { onConflict: 'id' });
  if (error) { showToast('저장 실패: ' + error.message, true); return false; }
  return true;
}

async function deleteEntryFromDB(id) {
  const { error } = await sb.from('entries').delete().eq('id', id);
  if (error) { showToast('삭제 실패: ' + error.message, true); return false; }
  return true;
}

// ── 최초 초기화: DB가 비어있으면 샘플 데이터 삽입 ────────
async function initDB() {
  showLoading('연결 중...');
  const { count } = await sb.from('entries').select('*', { count: 'exact', head: true });
  if (count === 0) {
    showLoading('초기 데이터 삽입 중...');
    for (const e of INITIAL_ENTRIES) await upsertEntry(e);
  }
  entries = await loadEntries();
  hideLoading();
  renderAll();
}

    try {
      const parts = url.split(',');
      const mime = parts[0].match(/:(.*?);/)[1];
      const bytes = atob(parts[1]);
      const arr = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      const blob = new Blob([arr], {type: mime});
      window.open(URL.createObjectURL(blob), '_blank');
    } catch(e) { alert('열기 실패: ' + e); }
  } else {
    window.open(url, '_blank');
  }
}
function renderAll() { renderStats(); renderFilters(); renderEntries(); }

function renderStats() {
  document.getElementById('stat-total').textContent = entries.length;
  document.getElementById('stat-days').textContent = new Set(entries.map(e => e.date)).size;
  document.getElementById('stat-links').textContent = entries.reduce((s,e) => s+(e.links||[]).length, 0);
  const now = new Date();
  document.getElementById('stat-this-month').textContent = entries.filter(e => {
    const d = new Date(e.date); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  }).length;
}

function renderFilters() { /* sidebar removed */ }

function renderEntries() {
  const grid = document.getElementById('entriesGrid');
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = entries.slice().sort((a,b) => b.date.localeCompare(a.date) || b.created.localeCompare(a.created));
  // category filter removed
  if (q) list = list.filter(e=>e.title.toLowerCase().includes(q)||e.body.toLowerCase().includes(q));
  if (!list.length) { grid.innerHTML=`<div class="empty" style="text-align:center;padding:80px 40px;color:var(--muted)"><div style="font-size:3rem;margin-bottom:16px">📖</div><h3 style="font-family:'Noto Serif KR',serif;font-size:1.2rem;color:var(--ink)">검색 결과가 없습니다</h3></div>`; return; }
  grid.innerHTML = list.map(e => `
    <div class="entry-card" onclick="viewEntry('${e.id}')">
      <div class="card-meta">
        <span class="card-date">${formatDate(e.date)}</span>
        <span class="card-category">${e.category}</span>
      </div>
      <div class="card-title">${e.title}</div>
      <div class="card-body">${e.body}</div>
      <div class="card-footer">
        <div class="card-links">
          ${(e.links||[]).slice(0,3).map(l=>`<a class="link-chip" href="${l.url}" target="_blank" onclick="event.stopPropagation()">🔗 ${l.label||'링크'}</a>`).join('')}
          ${(e.links||[]).length>3?`<span class="link-chip">+${(e.links||[]).length-3}개</span>`:''}
        </div>
        <div class="card-actions">
          <button class="icon-btn" title="수정" onclick="event.stopPropagation();openEditModal('${e.id}')">✏️</button>
          <button class="icon-btn" title="삭제" onclick="event.stopPropagation();deleteEntry('${e.id}')">🗑</button>
        </div>
      </div>
      ${(e.attachments||[]).length?`<div class="attachments-section"><div class="attachments-title">📎 창작물 첨부</div>${e.attachments.map(a=>typeof a==='object'?`<span class="attachment-chip" onclick="event.stopPropagation();openAttachment('${a.url}')" style="cursor:pointer;">🔗 ${a.label}</span>`:`<span class="attachment-chip">📄 ${a}</span>`).join('')}</div>`:''}
    </div>`).join('');
}

function formatDate(d) {
  return new Date(d+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}

function openAddModal() {
  editId=null;
  document.getElementById('modalTitle').textContent='새 기록 추가';
  document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('fTitle').value='';
  document.getElementById('fBody').value='';
  document.getElementById('fCategory').value='학습';
  document.getElementById('linksList').innerHTML='';
  document.getElementById('addOverlay').classList.add('open');
}

function openEditModal(id) {
  const e=entries.find(x=>x.id===id); if(!e) return;
  editId=id;
  document.getElementById('modalTitle').textContent='기록 수정';
  document.getElementById('fDate').value=e.date;
  document.getElementById('fTitle').value=e.title;
  document.getElementById('fBody').value=e.body;
  document.getElementById('fCategory').value=e.category;
  document.getElementById('linksList').innerHTML='';
  (e.links||[]).forEach(l=>addLinkRow(l.label,l.url));
  document.getElementById('addOverlay').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeOnOverlay(e,id) { if(e.target.classList.contains('overlay')) closeModal(id); }

function addLinkRow(label='',url='') {
  const row=document.createElement('div'); row.className='link-row';
  row.innerHTML=`<input type="text" placeholder="이름 (예: Claude)" value="${label}"><input type="url" placeholder="https://..." value="${url}"><button class="remove-link-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('linksList').appendChild(row);
}

async function saveEntry() {
  const title = document.getElementById('fTitle').value.trim();
  const body = document.getElementById('fBody').value.trim();
  if (!title) { alert('제목을 입력해주세요.'); return; }
  const links = [...document.getElementById('linksList').querySelectorAll('.link-row')].map(row => {
    const inputs = row.querySelectorAll('input'); return { label: inputs[0].value.trim(), url: inputs[1].value.trim() };
  }).filter(l => l.url);

  const entry = {
    id: editId || Date.now().toString(),
    date: document.getElementById('fDate').value,
    category: document.getElementById('fCategory').value,
    title, body, links,
    attachments: [],
    created: editId ? (entries.find(e => e.id === editId)?.created || new Date().toISOString()) : new Date().toISOString()
  };

  showLoading('저장 중...');
  const ok = await upsertEntry(entry);
  if (ok) {
    entries = await loadEntries();
    showToast('저장되었습니다 ✅');
  }
  hideLoading();
  closeModal('addOverlay');
  renderAll();
}

function viewEntry(id) {
  const e=entries.find(x=>x.id===id); if(!e) return;
  document.getElementById('viewModal').innerHTML=`
    <div class="card-category" style="margin-bottom:12px">${e.category}</div>
    <div class="view-title">${e.title}</div>
    <div class="view-meta">${formatDate(e.date)}</div>
    <div class="view-body">${e.body}</div>
    ${(e.links||[]).length?`<div style="font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:500;">관련 링크</div><div class="view-links">${e.links.map(l=>`<a class="link-chip" href="${l.url}" target="_blank">🔗 ${l.label||l.url}</a>`).join('')}</div>`:''}
    ${(e.attachments||[]).length?`<div style="margin-top:20px"><div style="font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:500;">📎 창작물 첨부</div>${e.attachments.map(a=>typeof a==='object'?`<span class="attachment-chip" onclick="openAttachment('${a.url}')" style="cursor:pointer;">🔗 ${a.label}</span>`:`<span class="attachment-chip">📄 ${a}</span>`).join('')}</div>`:''}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('viewOverlay')">닫기</button>
      <button class="btn btn-primary" onclick="closeModal('viewOverlay');openEditModal('${e.id}')">수정</button>
    </div>`;
  document.getElementById('viewOverlay').classList.add('open');
}

async function deleteEntry(id) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  showLoading('삭제 중...');
  const ok = await deleteEntryFromDB(id);
  if (ok) {
    entries = await loadEntries();
    showToast('삭제되었습니다');
  }
  hideLoading();
  renderAll();
}

initDB();
</script>
